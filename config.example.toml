# Global cganno config. Run `cganno init` to generate this plus a starter snapshot.
#
# Under annotations_dir, cganno keeps reusable sources plus the snapshot manifests
# that reference them. A source is a data file, a type="builtin" bundle, or a
# type="tool" external annotator — all under sources/:
#
#   <annotations_dir>/
#     sources/<name>/<version>/<name>-<version>.toml   (+ co-located build/tool assets)
#     snapshots/<name>.toml                            (manifest: refs + settings)
#
# A snapshot is the unit `annotate` runs against and the version stamped on results.
# See examples/ for a fully worked tree.
#
# This file lives in CGANNO_HOME (the -home flag, else $CGANNO_HOME, else the current
# directory). Values may reference $CGANNO_HOME, which expands to that base dir (or
# "." when unset). Relative paths also resolve against this file.

data_dir         = "$CGANNO_HOME/data"        # base dir for relative `localpath` source files
cache_dir        = "$CGANNO_HOME/data/cache"  # downloaded sources + tool images/data cached here,
                                             # keyed by name/version (set absolute to share across homes)
# temp_dir       = "/scratch/cganno-tmp"     # base for scratch dirs (tool workdirs, fan-out parts,
                                             # synthesized input); default $TMPDIR or /tmp. `annotate
                                             # --temp-dir DIR` overrides it. Set this if /tmp is small.
default_snapshot = "2026-06"
annotations_dir  = "./annotations"           # root for sources/, snapshots/ (default: $CGANNO_HOME/annotations)
# Config registries for `cganno registry` — each is a static HTTPS registry.toml URL.
# When unset, the built-in default (compgenlab/cganno-public-data-registry) is used.
# registries = [
#   "https://raw.githubusercontent.com/compgenlab/cganno-public-data-registry/main/registry.toml",
#   "https://example.org/my-lab-registry/registry.toml",
# ]

# The annotation cache is OPTIONAL: omit the whole [database] block and cganno
# computes annotations without persisting them (no cganno.db is written). Add it to
# memoize results. Cached values are scoped by assembly + data source name:version,
# so different snapshots share a cache safely and GRCh37/GRCh38 never collide.
[database]
backend = "sqlite"                # sqlite (default) | postgres (later)
path    = "$CGANNO_HOME/cganno.db"

# Reference FASTAs, keyed by assembly. A snapshot's reference is looked up from its
# assembly, so all snapshots on one assembly share a single FASTA (no per-snapshot
# path). Needed by external tools (e.g. VEP) and normalization — not by overlay
# annotation. Add one table per assembly you use.
[references.GRCh38]
fasta = "/data/ref/GRCh38.fa"
# [references.GRCh37]
# fasta = "/data/ref/GRCh37.fa"

# OPTIONAL: the async REST annotate server (`cganno server`). Omit this block if
# you only use the CLI. The API under /v1 is authenticated with HMAC tokens signed
# by master_key; a valid token is printed to stdout on startup. Jobs + results are
# stored in `db` (its own SQLite database, separate from the annotation cache).
# [server]
# endpoint   = "127.0.0.1:8080"          # IP:port to listen on
# master_key = "change-me-to-a-secret"   # HMAC key signing /v1 API tokens
# workers    = 1                          # async annotation worker pool size
# db         = "$CGANNO_HOME/cganno_server.db"  # job-queue + results DB
