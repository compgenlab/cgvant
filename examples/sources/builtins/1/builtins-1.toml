# Built-in annotators — cganno's self-contained "built-in tool calls" (hts, no data
# file). One source of `type = "builtin"` holds them; each annotation names its
# builtin and the output `name` its value appears under.
#   variant-only   (from chrom/pos/ref/alt; run on any path, incl. bare loci):
#                  auto_id, indel, tstv (CG_TSTV), tags. (vardist needs the
#                  neighboring variants in a stream, so it is `-o` VCF only.)
#   sample-derived (read the input VCF's per-sample FORMAT, so they need samples):
#                  dosage (CG_DS, GT), vaf (CG_VAF, SAC), minor_strand (CG_SBPCT),
#                  fisher_sb (CG_FSB), copy_logratio (CG_CNLR, AD).
# Parameterized builtins (tags, copy_logratio) carry their argument in `args`.
[[sources]]
name    = "builtins"
version = "1"
type    = "builtin"
  [[sources.annotations]]
  builtin = "auto_id"
  name    = "auto_id"
  [[sources.annotations]]
  builtin = "indel"
  name    = "indel"
  [[sources.annotations]]
  builtin = "tstv"
  name    = "tstv"
  [[sources.annotations]]
  builtin = "tags"
  name    = "PANEL"
  args    = "PANEL:v1"
